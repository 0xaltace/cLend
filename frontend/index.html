<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06080f" />
    <script>
      // Set theme before first paint (no flash). ?theme= overrides, else saved pref, else dark.
      (function () {
        var t = null;
        try {
          t = new URLSearchParams(location.search).get("theme") || localStorage.getItem("clend-theme");
        } catch (e) {
          /* fall through to default */
        }
        document.documentElement.dataset.theme = t === "light" ? "light" : "dark";
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <title>cLend — Fully Encrypted Lending</title>
    <meta
      name="description"
      content="The first fully encrypted lending platform. Collateral, debt and health factors are stored on-chain as FHE ciphertext, while the protocol still enforces solvency. Built on the Zama Protocol."
    />
    <meta property="og:title" content="cLend — Fully Encrypted Lending" />
    <meta
      property="og:description"
      content="Fully encrypted lending on the Zama Protocol — balances, debt and health factors stay encrypted on-chain. Live on Sepolia with official registry assets."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
